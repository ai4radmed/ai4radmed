####################################
# 파일명: config/vault.yml
# 목적: Vault 컨테이너 설정
#####################################

backup:
  schedule: "0 4 * * *" # Daily 04:00 (Hot Backup)
  retention_days: 30    # VAULT

env_vars:
  VAULT_ADDR: "${VAULT_ADDR}"
  VAULT_API_ADDR: "${VAULT_API_ADDR}"

compose_vars:
  VAULT_MEM_LIMIT: "640m"
  