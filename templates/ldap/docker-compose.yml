services:
  ldap:
    image: osixia/openldap:1.5.0
    container_name: ai4radmed-ldap
    hostname: ldap
    environment:
      LDAP_ORGANISATION: "${LDAP_ORGANISATION}"
      LDAP_DOMAIN: "${LDAP_DOMAIN}"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD}"
      LDAP_TLS_CRT_FILENAME: "ldap.crt"
      LDAP_TLS_KEY_FILENAME: "ldap.key"
      LDAP_TLS_CA_CRT_FILENAME: "ca.crt"
      LDAP_TLS_VERIFY_CLIENT: "try"
    volumes:
      - ./data/database:/var/lib/ldap:z
      - ./data/config:/etc/ldap/slapd.d:z
      - ./certs:/container/service/slapd/assets/certs:z
      # ports:
      # [SEC-08] Host Port 제거 (Nginx가 Gateway 역할)
      # - "${LDAP_PORT:-389}:389"
      # - "${LDAP_SSL_PORT:-636}:636"
    networks:
      - ai4radmed-app
    command: --copy-service
    restart: unless-stopped

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: ai4radmed-ldap-admin
    hostname: ldap-admin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "ldap"
      PHPLDAPADMIN_HTTPS: "false"
      # ports:
      # [SEC-08] Host Port 제거 (Nginx가 Gateway 역할)
      # - "${LDAP_ADMIN_PORT:-8081}:80"
    networks:
      - ai4radmed-app
    depends_on:
      - ldap
    restart: unless-stopped

networks:
  ai4radmed-app:
    external: true
    name: ai4radmed-app
