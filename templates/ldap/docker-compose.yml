services:
  ldap:
    image: osixia/openldap:1.5.0
    container_name: ai4radmed-ldap
    hostname: ldap
    restart: unless-stopped

    # Resource Limits
    mem_limit: ${LDAP_MEM_LIMIT:-256m}

    # [SEC-09] Immutable Infrastructure via Read-Only Root FS
    # read_only: true
    # tmpfs:
    #   - /run
    #   - /tmp

    networks:
      - ai4radmed-app

    environment:
      LDAP_ORGANISATION: "${LDAP_ORGANISATION}"
      LDAP_DOMAIN: "${LDAP_DOMAIN}"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD}"
      # [Refactor] Standardized filenames matching certs_manager.py
      # LDAP_TLS_CRT_FILENAME: "certificate.crt"
      # LDAP_TLS_KEY_FILENAME: "private.key"
      # LDAP_TLS_CA_CRT_FILENAME: "rootCA.crt"
      # LDAP_TLS_VERIFY_CLIENT: "try"
      LDAP_TLS: "false"
      CONTAINER_LOG_LEVEL: "5"

    volumes:
      - ${DATA_DIR:-/opt/ai4radmed/ldap/database}:/var/lib/ldap:z
      - ${CONF_DIR:-/opt/ai4radmed/ldap/config}:/etc/ldap/slapd.d:z
      # - ${CERTS_DIR:-/opt/ai4radmed/ldap/certs}:/container/service/slapd/assets/certs:z
      # [Seed] Initial Users
      # Map to a safe location or ensure directory structure prevents crash.
      # Currently manual seed via 'make seed-users' or script is preferred to avoid volume mount crash loops.
      # - /opt/ai4radmed/ldap/ldifs/users.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/users.ldif

    healthcheck:
      test: [ "CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-b", "", "-s", "base", "(objectclass=*)", "namingContexts" ]
      interval: 10s
      timeout: 5s
      retries: 5

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: ai4radmed-ldap-admin
    hostname: ldap-admin
    restart: unless-stopped

    # Resource Limits
    mem_limit: ${LDAP_ADMIN_MEM_LIMIT:-128m}

    # [SEC-09] Immutable Infrastructure via Read-Only Root FS
    # read_only: true
    # tmpfs:
    #   - /run
    #   - /tmp

    networks:
      - ai4radmed-app

    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "ldap"
      PHPLDAPADMIN_HTTPS: "false"

    healthcheck:
      test: [ "CMD-SHELL", "php -r \"if(@fsockopen('localhost', 80)) exit(0); exit(1);\"" ]
      interval: 10s
      timeout: 5s
      retries: 5

    depends_on:
      - ldap

networks:
  ai4radmed-app:
    external: true
    name: ai4radmed-app
