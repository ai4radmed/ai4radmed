services:
  nginx:
    build: .
    image: ai4radmed/nginx:custom
    container_name: ai4radmed-nginx
    restart: unless-stopped

    # 리소스 제한 (경량화)
    mem_limit: ${NGINX_MEM_LIMIT:-128m}

    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"

    # [SEC-09] Immutable Infrastructure & Minimized Capabilities
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE # Allow binding to 80/443
      - CHOWN # Required for Nginx to switch users
      - SETGID
      - SETUID
      - DAC_OVERRIDE # Required for reading 600 perm keys as restricted root

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    environment:
      - OIDC_PROVIDER=${OIDC_PROVIDER}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_COOKIE_SECRET=${OIDC_COOKIE_SECRET}
      # Nginx Env Directives need these to be present in container env

    extra_hosts:
      - "auth.ai4radmed.internal:127.0.0.1"
      - "ai4radmed.internal:127.0.0.1"

    # [Security] Immutable Infrastructure (Read-Only)
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
      - /var/cache/nginx

    networks:
      - ai4radmed-public
      - ai4radmed-app
      - ai4radmed-data # [SEC-08] Gateway needs access to Data Tier (Vault/Postgres)
      - ai4radmed # [Fix] Access to LDAP/Keycloak (Legacy Network)

    volumes:
      # 설정 파일 마운트 (OpenResty 경로)
      - ${CONFIG_DIR:-/opt/ai4radmed/nginx/config}/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ${CONFIG_DIR:-/opt/ai4radmed/nginx/config}/proxy.conf:/usr/local/openresty/nginx/conf/proxy.conf:ro
      # [Security] WAF Configs
      - ${CONFIG_DIR:-/opt/ai4radmed/nginx/config}/modsecurity.conf:/etc/nginx/modsecurity/modsecurity.conf:ro
      - ${CONFIG_DIR:-/opt/ai4radmed/nginx/config}/main.conf:/etc/nginx/modsecurity/main.conf:ro
      - ${CONFIG_DIR:-/opt/ai4radmed/nginx/config}/conf.d:/etc/nginx/conf.d:ro

      # 인증서 마운트 (모든 서비스의 인증서를 모아서 관리하거나, Gateway용 전용 인증서 사용)
      # 현재 전략: Gateway는 자신만의 wildcard 인증서를 가지거나, 각 서비스 도메인별 인증서를 가짐.
      # 초기에는 /certs 폴더 전체를 마운트하여 유연성 확보.
      - ${CERTS_DIR:-/opt/ai4radmed/nginx/certs}:/etc/nginx/certs:ro

      # 로그 (호스트와 공유)
      - ${LOGS_DIR:-/opt/ai4radmed/nginx/logs}:/var/log/nginx

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/health" ]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  ai4radmed-public:
    external: true
    name: ai4radmed-public
  ai4radmed-app:
    external: true
    name: ai4radmed-app
  ai4radmed-data:
    external: true
    name: ai4radmed-data
  ai4radmed:
    external: true
    name: ai4radmed
