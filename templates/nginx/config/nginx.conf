user root; # OpenResty needs root to read 600 permissions
env OPENID_CLIENT_SECRET;
env OIDC_PROVIDER;
env OIDC_CLIENT_ID;
env OIDC_CLIENT_SECRET;
env OIDC_COOKIE_SECRET;

# [Security] Load ModSecurity Module
load_module /usr/local/openresty/nginx/modules/ngx_http_modsecurity_module.so;

worker_processes  auto;

# error_log  /var/log/nginx/error.log notice;
error_log  /var/log/nginx/error.log debug;
# [Security] PID file in /tmp (tmpfs) for Read-Only FS
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    lua_package_path "/etc/nginx/conf.d/?.lua;;";
    resolver 127.0.0.11 ipv6=off; # Docker DNS for Lua resolution
    
    # [Fix] Shared Dictionaries for OIDC Caching
    lua_shared_dict discovery 1m;
    lua_shared_dict jwks 1m;
    lua_shared_dict sessions 10m; # Server-side session storage (plural for default)
    
    # [Fix] Increase Header Buffers for Large OIDC Cookies
    large_client_header_buffers 4 64k; # Increased from 32k for Keycloak Tokens
    client_header_buffer_size 8k;

    # [SEC-11] DDoS Protection (Rate Limiting Zone)
    # 10MB memory zone (approx 160k IPs), 30 req/sec limit (Relaxed for OIDC)
    limit_req_zone $binary_remote_addr zone=one:10m rate=30r/s;

    include       proxy.conf;

    # [Security] Temp paths redirected to tmpfs (Read-Only fix)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Hide nginx version information.
    server_tokens off;

    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    # Gzip Compression
    gzip  on;

    # Security Headers (기본)
    # 버전 정보 숨김 (Duplicate removed)

    # [Security] OIDC Authentication Enforcement (Global - DISABLED)
    # Strategy Change: Explicit per-service enforcement to prevent IdP Loops
    # access_by_lua_block {
    #     if ngx.var.uri:match("%.css$") or ngx.var.uri:match("%.js$") or ngx.var.uri:match("%.png$") or ngx.var.uri:match("%.ico$") then
    #         return
    #     end
    #     require("oidc_auth").validate()
    # }

    # Conf.d 설정 로드 (개별 사이트/서비스 설정)
    include /etc/nginx/conf.d/*.conf;

    # [Security] WAF (ModSecurity) Enable
    modsecurity off;
    # modsecurity_rules_file /etc/nginx/modsecurity/main.conf;
}
