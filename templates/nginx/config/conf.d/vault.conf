server {
    listen       80;
    server_name  vault.ai4radmed.internal;

    # HTTPS 리다이렉트 (운영 시 활성화)
    # return 301 https://$host$request_uri;

    # HTTPS 리다이렉트 (운영 시 활성화)
    # return 301 https://$host$request_uri;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vault.ai4radmed.internal;

    ssl_certificate     /etc/nginx/certs/vault.crt;
    ssl_certificate_key /etc/nginx/certs/vault.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        # [Security] Explicit OIDC Enforcement
        access_by_lua_block { require("oidc_auth").validate() }

        # [DEBUG] Log Outgoing Cookies
        header_filter_by_lua_block {
            local cookies = ngx.header["Set-Cookie"]
            if cookies then
                ngx.log(ngx.ERR, "[[ DEBUG-OIDC ]] OUTGOING Set-Cookie: " .. (type(cookies) == "table" and table.concat(cookies, ", ") or cookies))
            end
        }

        proxy_pass https://ai4radmed-vault:8200;
        
        # [SEC-07] mTLS Configuration (Nginx -> Vault)
        proxy_ssl_certificate     /etc/nginx/certs/certificate.crt;
        proxy_ssl_certificate_key /etc/nginx/certs/private.key;
        proxy_ssl_verify          off; 
        
        # Proxy Header 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443; # [Fix] Ensure Vault knows authoritative port

        # [Fix] Large Buffer for OIDC Headers/Cookies
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # WebSocket 지원
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
