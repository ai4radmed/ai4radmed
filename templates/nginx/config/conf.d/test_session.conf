server {
    listen 8888;
    server_name localhost;
    
    location / {
        content_by_lua_block {
             local opts = {
                name = "test_session",
                secret = "12345678901234567890123456789012",
                storage = "cookie",
                cipher = "aes-256-gcm"
             }
             local session = require("resty.session").open(opts)
             local count = session.data.count or 0
             count = count + 1
             session.data.count = count
             session:save()
             ngx.say("Count: ", count)
             ngx.say("ID: ", session.id)
             ngx.say("Cookie: ", ngx.var.cookie_test_session or "nil")
        }
    }
}
