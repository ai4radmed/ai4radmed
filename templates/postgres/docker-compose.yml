services:
  postgres:
    image: postgres:16.3-alpine
    container_name: ai4infra-postgres
    restart: unless-stopped

    mem_limit: 640m

    # [SEC-08] Network Segmentation: Remove Host Port Binding
    # ports:
    #   - "${PORT:-5432}:5432"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - ai4infra-data

    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ai4infra123!}
      - POSTGRES_DB=${POSTGRES_DB:-ai4infra}

    volumes:
      - ${DATA_DIR:-/opt/ai4infra/postgres/data}:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      timeout: 2s
      retries: 10

networks:
  ai4infra-data:
    external: true
    name: ai4infra-data
