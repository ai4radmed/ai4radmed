services:
  postgres:
    image: postgres:16.3-alpine
    container_name: ai4radmed-postgres
    restart: unless-stopped

    mem_limit: ${POSTGRES_MEM_LIMIT:-640m}

    # [SEC-09] Immutable Infrastructure
    read_only: true
    tmpfs:
      - /var/run/postgresql:size=512k,mode=1777
      - /tmp:size=512k,mode=1777

    # [SEC-08] Network Segmentation: Remove Host Port Binding
    # ports:
    #   - "${PORT:-5432}:5432"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - ai4radmed-data

    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ai4radmed123!}
      - POSTGRES_DB=${POSTGRES_DB:-ai4radmed}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD}
      - KC_DB_USERNAME=${KC_DB_USERNAME}
      - ORTHANC_DB_USERNAME=${ORTHANC_DB_USERNAME}

    volumes:
      - ${DATA_DIR:-/opt/ai4radmed/postgres/data}:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:z

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 2s
      timeout: 2s
      retries: 10

networks:
  ai4radmed-data:
    external: true
    name: ai4radmed-data
