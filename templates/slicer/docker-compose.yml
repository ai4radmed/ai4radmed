services:
  slicer:
    image: slicer/slicer-base:5.6
    container_name: ai4radmed-slicer
    ports:
      - "${SLICER_PORT}:8080"
    command: tail -f /dev/null
    volumes:
      - ./data:/home/slicer/data
    deploy:
      resources:
        limits:
          memory: ${SLICER_MEM_LIMIT}
    restart: unless-stopped
    networks:
      - ai4radmed

networks:
  ai4radmed:
    external: true
    name: ai4radmed
