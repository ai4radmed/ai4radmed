services:
  nmopti:
    image: slicer/slicer-base:5.6.2
    container_name: ai4infra-nmopti
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 4G
    volumes:
      - /home/ben/projects/ai4infra/extensions/nmopti:/app
    networks:
      - ai4infra
    restart: unless-stopped

networks:
  ai4infra:
    external: true
    name: ai4infra
