services:
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: ai4radmed-keycloak
    hostname: keycloak
    restart: unless-stopped

    # Resource Limits
    mem_limit: ${KEYCLOAK_MEM_LIMIT:-512m}

    networks:
      - ai4radmed-app # For Nginx to reach Keycloak
      - ai4radmed-data # For Keycloak to reach Postgres

    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_DB: "${KC_DB}"
      KC_DB_URL: "${KC_DB_URL}"
      KC_DB_USERNAME: "${KC_DB_USERNAME}"
      KC_DB_PASSWORD: "${KC_DB_PASSWORD}"
      # KC_HOSTNAME: "${KC_HOSTNAME:-auth.ai4radmed.internal}" # Conflict with URL
      KC_HOSTNAME_URL: "https://auth.ai4radmed.internal"
      KC_HOSTNAME_ADMIN_URL: "https://auth.ai4radmed.internal"
      KC_PROXY: "edge" # Nginx handles TLS

    volumes:
      - ${DATA_DIR:-/opt/ai4radmed/keycloak/data}:/opt/keycloak/data/import
      - ${CERTS_DIR:-/opt/ai4radmed/keycloak/certs}:/opt/keycloak/certs # [SEC-07] mTLS for DB Connection

    # [SEC-08] Host Port 제한 (127.0.0.1 for Admin Script Access)
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8080}:8080"

    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080" ]
      interval: 30s
      timeout: 10s
      retries: 3

    command: start-dev # Use start-dev for easier setup initially, switch to start in prod

networks:
  ai4radmed-app:
    external: true
    name: ai4radmed-app
  ai4radmed-data:
    external: true
    name: ai4radmed-data
