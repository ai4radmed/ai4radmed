services:
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: ai4infra-keycloak
    hostname: keycloak
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_DB: "${KC_DB}"
      KC_DB_URL: "${KC_DB_URL}"
      KC_DB_USERNAME: "${KC_DB_USERNAME}"
      KC_DB_PASSWORD: "${KC_DB_PASSWORD}"
      KC_HOSTNAME: "${KC_HOSTNAME}"
      KC_PROXY: "edge" # Nginx handles TLS
    command: start-dev # Use start-dev for easier setup initially, switch to start in prod
    volumes:
      - ./data:/opt/keycloak/data/import

    # [SEC-08] Host Port 제거 (Nginx가 Gateway 역할)
    # ports:
    #   - "${KEYCLOAK_PORT:-8080}:8080"

    networks:
      - ai4infra-app # For Nginx to reach Keycloak
      - ai4infra-data # For Keycloak to reach Postgres

    depends_on:
      - postgres
    restart: unless-stopped

  # Placeholder for database dependency reference
  # (실제 Postgres 컨테이너는 ai4infra-data 넷에 이미 존재함. 
  #  여기서는 docker-compose up 순서 보장을 위해 이름만 참조하거나 생략 가능.
  #  하지만 외부 서비스 의존성이므로 dummy removal을 권장하지만, 
  #  현재 구조상 depends_on 유지를 위해 네트워크만 맞춤)
  postgres:
    image: alpine
    container_name: ai4infra-keycloak-db-check
    command: echo "Checking DB dependency..."
    networks:
      - ai4infra-data
    restart: "no"

networks:
  ai4infra-app:
    external: true
    name: ai4infra-app
  ai4infra-data:
    external: true
    name: ai4infra-data
