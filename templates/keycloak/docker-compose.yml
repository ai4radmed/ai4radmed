services:
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: ai4radmed-keycloak
    hostname: keycloak
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_DB: "${KC_DB}"
      KC_DB_URL: "${KC_DB_URL}"
      KC_DB_USERNAME: "${KC_DB_USERNAME}"
      KC_DB_PASSWORD: "${KC_DB_PASSWORD}"
      # KC_HOSTNAME: "${KC_HOSTNAME:-auth.ai4radmed.internal}" # Conflict with URL
      KC_HOSTNAME_URL: "https://auth.ai4radmed.internal"
      KC_HOSTNAME_ADMIN_URL: "https://auth.ai4radmed.internal"
      KC_PROXY: "edge" # Nginx handles TLS
    command: start-dev # Use start-dev for easier setup initially, switch to start in prod
    volumes:
      - ./data:/opt/keycloak/data/import
      - ./certs:/opt/keycloak/certs # [SEC-07] mTLS for DB Connection

    # [SEC-08] Host Port 제거 (Nginx가 Gateway 역할)
    # ports:
    #   - "${KEYCLOAK_PORT:-8080}:8080"

    networks:
      - ai4radmed-app # For Nginx to reach Keycloak
      - ai4radmed-data # For Keycloak to reach Postgres

    depends_on:
      - postgres
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep '200 OK'" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Placeholder for database dependency reference
  # (실제 Postgres 컨테이너는 ai4radmed-data 넷에 이미 존재함. 
  #  여기서는 docker-compose up 순서 보장을 위해 이름만 참조하거나 생략 가능.
  #  하지만 외부 서비스 의존성이므로 dummy removal을 권장하지만, 
  #  현재 구조상 depends_on 유지를 위해 네트워크만 맞춤)
  postgres:
    image: alpine
    container_name: ai4radmed-keycloak-db-check
    command: echo "Checking DB dependency..."
    networks:
      - ai4radmed-data
    restart: "no"

networks:
  ai4radmed-app:
    external: true
    name: ai4radmed-app
  ai4radmed-data:
    external: true
    name: ai4radmed-data
