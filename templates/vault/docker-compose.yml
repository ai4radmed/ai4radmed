services:
  vault:
    image: hashicorp/vault:1.20.4
    container_name: ai4radmed-vault
    restart: unless-stopped

    cap_add:
      - IPC_LOCK
    cap_drop:
      - ALL
    mem_limit: ${VAULT_MEM_LIMIT:-640m}

    # [SEC-09] Immutable Infrastructure
    read_only: true
    tmpfs:
      - /tmp

    # [SEC-08] Network Segmentation: Remove Host Port Binding
    # ports:
    #   - "${PORT:-8200}:8200"
    networks:
      - ai4radmed-data

    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_API_ADDR: ${VAULT_API_ADDR}
      VAULT_CACERT: ${VAULT_CACERT}

    volumes:
      - ${DATA_DIR:-/opt/ai4radmed/vault/file}:/vault/file:z
      - ${CERTS_DIR:-/opt/ai4radmed/vault/certs}:/vault/certs:z
      - ${CONF_DIR:-/opt/ai4radmed/vault/config}:/vault/config:z
      - ${USB_DIR:-/mnt/usb}:/mnt/usb:ro # [SEC-06] Auto-Unseal Simulation

    # [Fix] Run as 'vault' user (UID 100) to match file ownership and bypass Root/Cap issues
    user: "100:1000"

    # [SEC-09] Removed mutable 'cp' commands. Config uses mounted paths directly.
    # [Fix] Bypass default entrypoint which tries 'setcap' (fails without CAP_SETFCAP)
    entrypoint: "vault server -config=/vault/config/vault.hcl"

networks:
  ai4radmed-data:
    external: true
    name: ai4radmed-data
