services:
  vault:
    image: hashicorp/vault:1.20.4
    container_name: ai4radmed-vault
    restart: unless-stopped

    cap_add:
      - IPC_LOCK
    cap_drop:
      - ALL
    mem_limit: ${VAULT_MEM_LIMIT:-640m}

    # [SEC-09] Immutable Infrastructure
    read_only: true
    tmpfs:
      - /tmp

    # [SEC-08] Network Segmentation: Remove Host Port Binding
    # ports:
    #   - "${PORT:-8200}:8200"
    networks:
      - ai4radmed-data

    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_API_ADDR: ${VAULT_API_ADDR}

    volumes:
      - ${DATA_DIR:-/opt/ai4radmed/vault/file}:/vault/file
      - ${CERTS_DIR:-/opt/ai4radmed/vault/certs}:/vault/certs
      - ${CONF_DIR:-/opt/ai4radmed/vault/config}:/vault/config
      - ${USB_DIR:-/mnt/usb}:/mnt/usb:ro # [SEC-06] Auto-Unseal Simulation

    # [SEC-09] Removed mutable 'cp' commands. Config uses mounted paths directly.
    command: vault server -config=/vault/config/vault.hcl

networks:
  ai4radmed-data:
    external: true
    name: ai4radmed-data
